<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>运动</title>
    <style>
        #box {
            width: 300px;
            height: 300px;
            background: red;
            margin-left: 0;
        }
    </style>
</head>
<body>
<div id="box">

</div>
<button id="btn">运动</button>
</body>
</html>
<script>
    var timer = null;
    var box = document.getElementById('box');
    var btn = document.getElementById('btn');

    /* console.log(getComputedStyle(box).marginLeft);
     console.log(box.currentStyle.marginLeft);*/
    function getStyle(dom, attr) {
        if (dom.currentStyle) {
            return dom.currentStyle[attr];
        } else {
            return getComputedStyle(dom)[attr];
        }
    }

    console.log(getStyle(box, 'width'));
    btn.onclick = function () {
        clearInterval(timer);
        timer = setInterval(function () {
            var margin = parseInt(getStyle(box, 'marginLeft'));
            var speed = (600 - margin) / 8;
            if (speed > 0) {
                speed = Math.ceil(speed);
            }else
                    speed=Math.floor(speed);
            if (margin == 600)
                clearInterval(timer);
            else
                box.style.marginLeft = margin + speed + 'px';
        }, 60);
    }

</script>
