<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        .box{
            width: 400px;
            height:600px;
            border: 4px solid red;
            margin: 10px auto;
            perspective: 3000px;
        }
        .box1{
            width: 400px;
            height: 600px;
            background: green;
            transition: all 3s linear;
            transform-origin: right center;
        }
        .box1:hover{
            transform:rotateY(150deg);
        }
    </style>
</head>
<body>
<div class="box">
    <div class="box1">

    </div>
</div>
</body>
</html>
