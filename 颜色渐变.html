<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS3</title>
    <style>
        .box {
            width: 200px;
            height: 200px;
            background: red;
            animation: gun 2s linear infinite alternate;
        }
        @keyframes gun {
            10%{
                background: red;
            }
            20%{
                background: green;
            }
            30%{
                background: black;
            }
        }
    </style>
</head>
<body>
<div class="box"></div>
</body>
</html>
